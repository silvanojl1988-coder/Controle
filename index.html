<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle Neutralização</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#16a34a">

<style>
body { font-family: Arial; background:#0b1220; color:white; margin:0; }
.header { background:#16a34a; padding:15px; text-align:center; font-weight:bold; }
.container { padding:10px; }
.box { background:#1e293b; padding:10px; border-radius:8px; margin-bottom:10px; }

input { width:100%; padding:8px; margin-bottom:5px; border-radius:5px; border:none; }

button {
 width:100%; padding:10px; margin-top:5px;
 background:#22c55e; border:none; color:white;
 font-weight:bold; border-radius:5px;
}

.result { padding:10px; margin-top:10px; border-radius:5px; }

.ok { background:#16a34a; }
.warn { background:#eab308; color:black; }
.bad { background:#dc2626; }

</style>
</head>

<body>

<div class="header">
CONTROLE DE NEUTRALIZAÇÃO
</div>

<div class="container">

<div class="box">

<label>Acidez degomado (%)</label>
<input id="acidezDeg" value="0.50">

<label>Umidade (%)</label>
<input id="umidade" value="0.12">

<label>Sabão (ppm)</label>
<input id="sabao" value="200">

<label>Acidez final (%)</label>
<input id="acidezNeu" value="0.03">

<label>Excesso (%)</label>
<input id="excesso" value="30">

<label>Bé</label>
<input id="be" value="15">

<button onclick="analisar()">ANALISAR</button>

</div>

<div class="box">
<div id="resultado"></div>
</div>

</div>

<script>

// 🔊 som
function beep(){
 let ctx = new (window.AudioContext||window.webkitAudioContext)();
 let osc = ctx.createOscillator();
 osc.frequency.value = 800;
 osc.connect(ctx.destination);
 osc.start();
 setTimeout(()=>osc.stop(),200);
}

// 📳 vibração
function vibrar(){
 if(navigator.vibrate) navigator.vibrate([200,100,200]);
}

// valor seguro
function val(id){
 return parseFloat(document.getElementById(id).value)||0;
}

function analisar(){

let acidezDeg = val("acidezDeg");
let sabao = val("sabao");
let acidezNeu = val("acidezNeu");
let umidade = val("umidade");
let excesso = val("excesso");
let be = val("be");

let novoExcesso = excesso;
let novoBe = be;

let msg = "";
let classe = "ok";

if(sabao > 250 && acidezNeu > 0.05){
 msg="Falta de neutralização";
 novoExcesso+=2;
 classe="bad";
}
else if(sabao > 250){
 msg="Excesso de soda";
 novoExcesso-=2;
 novoBe-=1;
 classe="bad";
}
else if(sabao < 120){
 msg="Baixa reação";
 novoExcesso+=1;
 classe="warn";
}

if(umidade > 0.15){
 msg+=" | Umidade alta → subir Bé";
 novoBe+=1;
}

if(classe==="bad"){ beep(); vibrar(); }

document.getElementById("resultado").innerHTML=
`<div class="result ${classe}">
${msg}<br>
Excesso: ${novoExcesso.toFixed(1)}%<br>
Bé: ${novoBe.toFixed(1)}
</div>`;
}


// PWA
if ('serviceWorker' in navigator) {
 navigator.serviceWorker.register('sw.js');
}

</script>

</body>
</html>
